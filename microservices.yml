---
- name: setup the micro service architecture on all the qa servers
  hosts: all
  tasks: 
    - name: creating containers for voting application
      docker_container: 
       name: voting-app
       image: intelliqit/voting-app
       ports: 
         - 5050:80

    - name: creating the redis container
      docker_container: 
       name: redis-app
       image: redis
       ports: 
         - 6379:6379

    - name: creating the worker-app
      docker_container: 
        name: worker-app
        image: intelliqit/worker-app


    - name: creating the postgress application
      docker_container: 
        name: postgres-app
        image: postgres
        env: 
          POSTGRES_PASSWORD: Mohansai
          POSTGRES_USER: Myproject
          POSTGRES_DB: Mydb

    - name: creating container for the result app
      docker_container: 
        name: result-app
        image: intelliqit/result-app
        ports: 
          - 6060:80



...
